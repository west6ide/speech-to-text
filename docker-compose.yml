services:
  meeting-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meeting-ai
    restart: unless-stopped
    ports:
      - "18001:8000"
    env_file:
      - .env
    environment:
      PORT: 8000
      FFMPEG_PATH: ffmpeg
      FFPROBE_PATH: ffprobe
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
